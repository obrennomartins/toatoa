name: Esteira de integração e desenvolvimento contínuos

on:
  push:
    branches:
      - master

jobs:
  sonarcloud:
    runs-on: windows-latest
    steps:
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Verificar código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache de pacotes SonarCloud
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache do scanner SonarCloud
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Instalar scanner do SonarCloud
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory -Force
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

      - name: Compilar e analisar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          .\.sonar\scanner\dotnet-sonarscanner begin `
            /k:"obrennomartins_toatoa" `
            /o:"obrennomartins" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.exclusions="sql/**/*,src/ToAToa.DataAccess/Migrations/**/*"
          dotnet build ToAToa.sln -c Release
          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"

  codacy:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar código
        uses: actions/checkout@v3

      - name: Instalar .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependências
        run: dotnet restore

      - name: Executar testes e gerar cobertura para Codacy
        run: dotnet test --configuration Release --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload de cobertura de testes para o Codacy
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          # O script do Codacy procura pelo arquivo coverage.xml no formato 'cobertura'
          # O comando 'dotnet test' acima gera 'coverage.cobertura.xml', então precisamos encontrar o caminho exato
          COVERAGE_FILE=$(find ./TestResults -name "coverage.cobertura.xml")
          echo "Encontrado arquivo de cobertura em: $COVERAGE_FILE"
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r $COVERAGE_FILE

  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@31d6f3309b31c566758e1314a3d9ef0dff75ecbd
        with:
          pr-mode: false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
          QODANA_ENDPOINT: 'https://qodana.cloud'

  docker:
    runs-on: ubuntu-latest
    needs:
      - sonarcloud
      - codacy
      - qodana
    steps:
      - name: Checar código
        uses: actions/checkout@v4

      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Entrar no registro de contêineres
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.CONTAINER_REGISTRY_ADDRESS }}
          username: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}

      - name: Construir e enviar imagem de contêiner
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.CONTAINER_REGISTRY_IMAGE_NAME }}:latest
            ${{ secrets.CONTAINER_REGISTRY_IMAGE_NAME }}:${{ github.ref_name }}
            ${{ secrets.CONTAINER_REGISTRY_IMAGE_NAME }}:build-${{ github.run_number }}
          labels: |
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.authors=${{ github.event.head_commit.author.name }}
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=${{ github.event.head_commit.message }}

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Acionar webhook do Portainer
        run: |
          curl -X POST ${{ secrets.PORTAINER_WEBHOOK_URL }}
